<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BeautyBook</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header__logo">BeautyBook</div>
    <nav class="header__nav">
      <a href="#">Trouver un salon</a>
      <a href="#">Comment ça marche</a>
      <a href="#">Connexion</a>
      <button class="btn-primary">Prendre RDV</button>
    </nav>
  </header>

  <!-- HERO -->
  <section class="hero">
    <h1>Réservez votre salon de beauté en quelques clics</h1>
    <p>Trouvez les meilleurs salons près de chez vous et réservez instantanément</p>
    <div class="hero__search">
      <input type="text" placeholder="Coiffure, manucure, massage...">
      <input type="text" placeholder="Ville ou code postal">
      <button class="btn-primary">Rechercher</button>
    </div>
  </section>

</body>
</html>
